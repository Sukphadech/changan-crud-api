
services:

  db:
    image: postgres:17

    container_name: employee_db

    restart: always

    environment:
      POSTGRES_DB: employee_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:

    build: .

    command: >
      python manage.py runserver
      0.0.0.0:8000

    volumes:
      - .:/app

    ports:
      - "8000:8000"

    depends_on:
      - db

volumes:

  postgres_data: